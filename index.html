<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SPACE WARS — by IAN</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');
:root {
    --neon-purple: #b44fff;
    --neon-pink: #ff2d9b;
    --neon-cyan: #00ffe7;
    --neon-blue: #2979ff;
    --neon-green: #39ff14;
    --neon-orange: #ff6d00;
    --neon-yellow: #ffe600;
    --neon-red: #ff1744;
    --dark: #04000e;
    --dark2: #080018;
    --panel-bg: rgba(4, 0, 18, 0.97);
    --border: rgba(180, 79, 255, 0.4);
    --text: #e0d4ff;
    --sub: #7c5fa0;
}
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}
html, body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
}
#game-container {
    position: relative;
    width: 100%;
    max-width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
}
#top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: linear-gradient(90deg, #04000e, #100025, #04000e);
    border-bottom: 1px solid var(--border);
    z-index: 3000;
    position: relative;
    backdrop-filter: blur(4px);
}
#user-info {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 8px;
    transition: background 0.2s;
    animation: userPulse 3s ease-in-out infinite;
}
@keyframes userPulse {
    0%, 100% { box-shadow: 0 0 8px rgba(180,79,255,0.3); }
    50% { box-shadow: 0 0 20px rgba(0,255,231,0.5); }
}
#user-info:hover { background: rgba(180,79,255,0.15); }
#user-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan));
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; border: 2px solid var(--neon-purple);
    transition: border-color 0.3s;
}
#user-info:hover #user-avatar { border-color: var(--neon-cyan); }
#user-name {
    font-family: 'Orbitron', monospace; font-size: 12px;
    color: var(--neon-cyan); letter-spacing: 1px;
    text-shadow: 0 0 8px var(--neon-cyan);
}
.top-btns { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.top-btn {
    background: rgba(180,79,255,0.1); border: 1px solid rgba(180,79,255,0.3);
    border-radius: 6px; padding: 6px 10px; color: var(--text);
    font-size: 10px; cursor: pointer; transition: all 0.2s;
    font-family: 'Orbitron', monospace; white-space: nowrap; letter-spacing: 1px;
}
.top-btn:hover {
    background: rgba(180,79,255,0.25); border-color: var(--neon-purple);
    box-shadow: 0 0 14px rgba(180,79,255,0.4); transform: translateY(-1px);
}
#hud {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; padding: 6px 12px;
    background: linear-gradient(90deg, #04000e, #100025, #04000e);
    border-bottom: 1px solid var(--border);
    font-family: 'Orbitron', monospace; font-size: 10px; letter-spacing: 1px;
    z-index: 101; position: relative;
}
.hud-item { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.hud-label { font-size: 7px; color: var(--sub); letter-spacing: 2px; }
.hud-val { color: #fff; font-weight: 700; font-size: 11px; }
.hud-coins { color: var(--neon-yellow); }
.hud-lives { color: var(--neon-pink); }
#canvas-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; background: var(--dark); }
canvas { display: block; border: 1px solid var(--border); cursor: none; touch-action: none; box-shadow: 0 0 60px rgba(180,79,255,0.15); transition: box-shadow 0.5s; }
#msg-bar {
    width: 100%; text-align: center; font-size: 11px; color: var(--neon-cyan);
    min-height: 20px; padding: 4px 0; font-family: 'Orbitron', monospace;
    letter-spacing: 1px; text-shadow: 0 0 8px var(--neon-cyan);
    background: linear-gradient(90deg, #04000e, #100025, #04000e);
    border-top: 1px solid var(--border); z-index: 101; position: relative;
}
#overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 2500;
    background: transparent;
}
.panel {
    pointer-events: all;
    background: var(--panel-bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 24px 28px;
    width: 90%; max-width: 560px; max-height: 85vh;
    overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--neon-purple) var(--dark2);
    box-shadow: 0 0 80px rgba(180,79,255,0.35), 0 0 200px rgba(0,255,231,0.08);
    animation: panelIn 0.25s cubic-bezier(0.22, 0.61, 0.36, 1);
}
@keyframes panelIn { from { opacity: 0; transform: scale(0.92) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.panel-title {
    font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 900;
    text-align: center; letter-spacing: 4px; margin-bottom: 4px;
    background: linear-gradient(90deg, var(--neon-pink), var(--neon-purple), var(--neon-cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.panel-sub { text-align: center; font-size: 11px; color: var(--sub); margin-bottom: 14px; letter-spacing: 1px; }
.btn {
    display: block; width: 100%; padding: 10px 14px; margin: 5px 0;
    background: linear-gradient(90deg, rgba(180,79,255,0.06), rgba(0,255,231,0.04));
    border: 1px solid rgba(180,79,255,0.3); border-radius: 10px;
    color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 13px;
    font-weight: 600; cursor: pointer; transition: all 0.15s;
    text-align: center; letter-spacing: 1px; position: relative; overflow: hidden;
}
.btn::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(180,79,255,0.1), transparent);
    transform: translateX(-100%); transition: transform 0.4s;
}
.btn:hover::after { transform: translateX(100%); }
.btn:hover { border-color: var(--neon-purple); color: #fff; box-shadow: 0 0 16px rgba(180,79,255,0.3); }
.btn.primary {
    border-color: var(--neon-cyan); background: linear-gradient(90deg, rgba(0,255,231,0.08), rgba(180,79,255,0.08));
    color: var(--neon-cyan); font-weight: 700; letter-spacing: 2px; box-shadow: 0 0 20px rgba(0,255,231,0.15);
}
.btn.primary:hover { box-shadow: 0 0 30px rgba(0,255,231,0.3); }
.btn.danger { border-color: var(--neon-red); color: var(--neon-red); }
.btn.success { border-color: var(--neon-green); color: var(--neon-green); }
.sec {
    font-size: 9px; color: var(--neon-purple); letter-spacing: 2px; text-transform: uppercase;
    margin: 12px 0 6px; border-top: 1px solid rgba(180,79,255,0.15); padding-top: 10px;
    font-family: 'Orbitron', monospace;
}
.row {
    display: flex; align-items: center; padding: 8px 10px;
    border: 1px solid rgba(180,79,255,0.2); border-radius: 8px; margin: 4px 0;
    gap: 8px; background: rgba(180,79,255,0.05); transition: border-color 0.15s;
}
.row:hover { border-color: rgba(180,79,255,0.4); }
.row-name { flex: 1; font-size: 13px; color: #fff; font-weight: 600; }
.row-desc { font-size: 10px; color: var(--sub); display: block; margin-top: 2px; }
.row-cost { color: var(--neon-yellow); font-size: 11px; font-family: 'Orbitron', monospace; white-space: nowrap; }
.ibtn {
    padding: 4px 10px; font-size: 10px; border: 1px solid rgba(180,79,255,0.4);
    border-radius: 6px; background: transparent; color: var(--neon-purple);
    cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 700;
    white-space: nowrap; transition: all 0.12s;
}
.ibtn:hover:not(:disabled) { background: rgba(180,79,255,0.15); border-color: var(--neon-purple); color: #fff; }
.ibtn:disabled { color: #2d1a4a; cursor: default; border-color: #1a0d33; }
.ibtn.owned { color: var(--neon-green); border-color: var(--neon-green); }
.close-btn { float: right; background: none; border: none; color: var(--sub); cursor: pointer; font-size: 18px; line-height: 1; transition: color 0.1s; }
.close-btn:hover { color: var(--neon-pink); }
input[type=text] {
    background: rgba(180,79,255,0.05); border: 1px solid rgba(180,79,255,0.4);
    border-radius: 8px; color: var(--neon-cyan); padding: 8px 12px; font-size: 13px;
    width: 100%; outline: none; margin: 5px 0; font-family: 'Rajdhani', sans-serif; letter-spacing: 1px;
}
input[type=text]:focus { border-color: var(--neon-pink); box-shadow: 0 0 12px rgba(255,45,155,0.2); }
.tab {
    padding: 6px 12px; font-size: 10px; border: 1px solid rgba(180,79,255,0.25);
    border-radius: 6px; background: transparent; color: var(--sub); cursor: pointer;
    font-family: 'Orbitron', monospace; transition: all 0.12s; margin: 2px;
}
.tab:hover, .tab.active { border-color: var(--neon-purple); color: var(--neon-purple); background: rgba(180,79,255,0.1); }
.r-common { color: #a78bfa; } .r-rare { color: #38bdf8; } .r-epic { color: #c084fc; }
.r-legendary { color: var(--neon-yellow); }
.r-mythic { background: linear-gradient(90deg, #ff1744, #e879f9, #818cf8, #00ffe7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 800; }
.r-divine { background: linear-gradient(90deg, #ffe600, #ff6d00, #ff1744, #ff2d9b, #b44fff, #00ffe7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 900; }
.ship-mini { border-radius: 6px; background: rgba(180,79,255,0.08); border: 1px solid rgba(180,79,255,0.2); flex-shrink: 0; }
.diff-btn {
    display: inline-block; padding: 8px 16px; margin: 4px; border: 2px solid;
    border-radius: 8px; cursor: pointer; font-family: 'Orbitron', monospace;
    font-size: 11px; font-weight: 700; transition: all 0.2s;
}
.diff-btn.easy { border-color: #4ade80; color: #4ade80; }
.diff-btn.normal { border-color: #60a5fa; color: #60a5fa; }
.diff-btn.hard { border-color: #f97316; color: #f97316; }
.diff-btn.insane { border-color: #dc2626; color: #dc2626; }
.diff-btn.impossible { border-color: #a855f7; color: #a855f7; }
.diff-btn:hover, .diff-btn.selected { box-shadow: 0 0 20px currentColor; transform: scale(1.05); }
#save-ind {
    position: fixed; bottom: 12px; right: 12px;
    background: rgba(4,0,18,0.95); border: 1px solid var(--neon-green);
    border-radius: 8px; padding: 6px 12px; font-size: 10px; color: var(--neon-green);
    opacity: 0; transition: opacity 0.5s; pointer-events: none; z-index: 999;
    font-family: 'Orbitron', monospace;
}
.friend-item { padding: 8px; border: 1px solid rgba(180,79,255,0.2); border-radius: 6px; margin: 4px 0; display: flex; align-items: center; gap: 8px; background: rgba(180,79,255,0.03); }
.friend-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink)); display: flex; align-items: center; justify-content: center; font-size: 12px; }
.lb-entry { padding: 8px 12px; border: 1px solid rgba(180,79,255,0.15); border-radius: 6px; margin: 3px 0; display: flex; justify-content: space-between; align-items: center; background: rgba(180,79,255,0.03); }
.lb-rank { font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700; color: var(--neon-yellow); min-width: 30px; }
@media (max-width: 768px) {
    .panel { padding: 16px 18px; max-width: 95%; border-radius: 14px; }
    .panel-title { font-size: 17px; }
    #hud { font-size: 8px; }
    .top-btn { font-size: 9px; padding: 5px 8px; }
    #user-name { font-size: 10px; }
}
</style>
</head>
<body>
<audio id="bg-music" loop preload="auto">
    <source src="Music.mp3" type="audio/mpeg">
</audio>
<div id="game-container">
    <div id="top-bar">
        <div id="user-info" onclick="showPanelFromTopBar('profile')" title="Your Profile">
            <div id="user-avatar">👤</div>
            <span id="user-name">Guest</span>
        </div>
        <div class="top-btns">
            <button class="top-btn" onclick="showPanelFromTopBar('friends')">👥 Friends</button>
            <button class="top-btn" onclick="showPanelFromTopBar('leaderboard')">🏆 LB</button>
            <button class="top-btn" onclick="showPanelFromTopBar('settings')">⚙ Set</button>
            <button class="top-btn" onclick="toggleSound()" id="sound-btn">🔊</button>
            <button class="top-btn" onclick="toggleMusic()" id="music-btn">🎵</button>
        </div>
    </div>
    <div id="hud">
        <div class="hud-item"><span class="hud-label">SCORE</span><span class="hud-val" id="h-score">0</span></div>
        <div class="hud-item"><span class="hud-label">GOLD</span><span class="hud-val hud-coins" id="h-gold">★0</span></div>
        <div class="hud-item"><span class="hud-label">LEVEL</span><span class="hud-val" id="h-level">1</span></div>
        <div class="hud-item"><span class="hud-label">LIVES</span><span class="hud-val hud-lives" id="h-lives">♥♥♥</span></div>
        <div class="hud-item"><span class="hud-label">SHIP</span><span class="hud-val" id="h-ship" style="font-size:9px;">VIPER</span></div>
        <div class="hud-item"><span class="hud-label">DIFF</span><span class="hud-val" id="h-diff" style="font-size:9px;">NORMAL</span></div>
    </div>
    <div id="canvas-wrapper">
        <canvas id="cv"></canvas>
        <div id="overlay"></div>
    </div>
    <div id="msg-bar"></div>
</div>
<div id="save-ind">💾 SAVED</div>

<script>
// ═══════════════════════════════════════════════════════════
//  IAN'S SPACE WARS v9 — POLISHED COSMIC EDITION
//  Music from Music.mp3, balanced difficulty, improved UI
// ═══════════════════════════════════════════════════════════

const cv = document.getElementById('cv');
const cx = cv.getContext('2d');
let W, H;

let settings = { resolution: 'auto', difficulty: 'normal', controlScheme: 'mouse' };

const bgMusic = document.getElementById('bg-music');
bgMusic.volume = 0.3;

function initCanvas() {
    const wrapper = document.getElementById('canvas-wrapper');
    const wrapperWidth = wrapper.clientWidth;
    const wrapperHeight = wrapper.clientHeight;
    if (settings.resolution === 'auto') {
        W = Math.min(wrapperWidth, 1200);
        H = Math.min(wrapperHeight, 800);
    } else {
        const resMap = { '720p': [1280, 720], '1080p': [1920, 1080], '1440p': [2560, 1440] };
        [W, H] = resMap[settings.resolution] || [1280, 720];
        const aspectRatio = W / H;
        if (wrapperWidth / wrapperHeight > aspectRatio) {
            H = wrapperHeight;
            W = H * aspectRatio;
        } else {
            W = wrapperWidth;
            H = W / aspectRatio;
        }
    }
    cv.width = W;
    cv.height = H;
    cv.style.width = W + 'px';
    cv.style.height = H + 'px';
}
initCanvas();
window.addEventListener('resize', () => {
    initCanvas();
    rebuildBg();
    initStars();
    initPlanets();
    initSpaceDust();
});

// ── USERNAME SYSTEM ──────────────────────────────────────
const adjectives = ['Murky','Swift','Gray','Dark','Bright','Shadow','Neon','Cyber','Stellar','Cosmic','Phantom','Mystic','Thunder','Lightning','Crystal','Diamond','Titanium','Steel','Iron','Silver','Golden','Ruby','Emerald','Sapphire','Plasma'];
const nouns = ['Garlic','Mark','Wolf','Hawk','Tiger','Dragon','Phoenix','Eagle','Falcon','Raven','Storm','Blaze','Frost','Nova','Comet','Star','Galaxy','Nebula','Vortex','Warrior','Hunter','Ranger','Knight','Pilot','Commander'];
function generateUsername() {
    const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
    const noun = nouns[Math.floor(Math.random() * nouns.length)];
    const num = Math.floor(Math.random() * 100);
    return adj + noun + num;
}
let username = generateUsername();
let userAvatar = '👤';

function loadUserData() {
    try {
        const data = JSON.parse(localStorage.getItem('spaceWarsUser') || '{}');
        if (data.username) username = data.username;
        if (data.avatar) userAvatar = data.avatar;
        document.getElementById('user-name').textContent = username;
        document.getElementById('user-avatar').textContent = userAvatar;
    } catch(e) {}
}
function saveUserData() { try { localStorage.setItem('spaceWarsUser', JSON.stringify({username, avatar: userAvatar})); } catch(e) {} }
loadUserData();

// ── DIFFICULTY (FIXED: higher fireDelay = slower player fire) ──
const DIFF_SETTINGS = {
    easy:    { mult:0.6, enemySpeed:0.7, fireDelay:0.8, enemyFireRate:2.0, damage:0.7, coins:1.5 },
    normal:  { mult:1,   enemySpeed:1,   fireDelay:1.0, enemyFireRate:1.0, damage:1,   coins:1 },
    hard:    { mult:1.5, enemySpeed:1.3, fireDelay:1.3, enemyFireRate:0.7, damage:1.4, coins:1.2 },
    insane:  { mult:2.5, enemySpeed:1.6, fireDelay:1.7, enemyFireRate:0.5, damage:2,   coins:1.5 },
    impossible: { mult:4, enemySpeed:2, fireDelay:2.2, enemyFireRate:0.3, damage:3, coins:2 }
};

// ── AUDIO (effects + Music.mp3) ──────────────────────────
let AC, sfxOn = true;
function initAC() { if(AC) return; AC = new (window.AudioContext || window.webkitAudioContext)(); }
function tone(freq, dur, type='sine', vol=0.12) {
    if(!sfxOn || !AC) return;
    try {
        const o=AC.createOscillator(), g=AC.createGain(), t=AC.currentTime;
        o.connect(g); g.connect(AC.destination);
        o.type=type; o.frequency.value=freq;
        g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+0.01);
        g.gain.exponentialRampToValueAtTime(0.001,t+dur);
        o.start(t); o.stop(t+dur);
    } catch(e){}
}
function sfxShoot(){ tone(920,0.07,'square',0.04); }
function sfxBoom(){ tone(55,0.45,'sawtooth',0.16); tone(30,0.55,'triangle',0.1); }
function sfxPick(){ [500,700,900].forEach((f,i)=>tone(f,0.08,'sine',0.07)); }
function sfxLvl(){ [300,500,700].forEach((f,i)=>tone(f,0.12,'sine',0.06)); }
function sfxHit(){ tone(180,0.12,'square',0.08); }
function sfxBossExplode(){ tone(25,0.8,'sawtooth',0.22); tone(15,1.0,'triangle',0.18); }

function toggleSound() {
    sfxOn = !sfxOn;
    document.getElementById('sound-btn').textContent = sfxOn ? '🔊' : '🔇';
}
function toggleMusic() {
    if (bgMusic.paused) {
        bgMusic.play().catch(e => { /* autoplay might be blocked, handled on first user interaction */ });
        document.getElementById('music-btn').textContent = '🎵';
    } else {
        bgMusic.pause();
        document.getElementById('music-btn').textContent = '🎵❌';
    }
}

// ── SAVE / LOAD ──────────────────────────────────────────
const SK = 'ianSpaceWarsV9';
function saveGame() {
    try {
        localStorage.setItem(SK, JSON.stringify({
            coins: totalCoins, ups: {...ups},
            ships: SHIPS.map(s=>({id:s.id,owned:s.owned})),
            activeId: activeShip.id, hi: hiScore, wins: tournWins,
            settings, friends, leaderboard: getLeaderboard()
        }));
        document.getElementById('save-ind').style.opacity='1';
        setTimeout(()=> document.getElementById('save-ind').style.opacity='0', 1800);
    } catch(e){ console.error('Save failed:', e); }
}
function loadGame() {
    try {
        const d=JSON.parse(localStorage.getItem(SK)||'{}');
        if(d.coins) totalCoins=d.coins;
        if(d.ups) Object.assign(ups,d.ups);
        if(d.ships) d.ships.forEach(s=>{const sh=SHIPS.find(x=>x.id===s.id);if(sh)sh.owned=s.owned;});
        if(d.activeId){const s=SHIPS.find(x=>x.id===d.activeId);if(s&&s.owned)activeShip=s;}
        if(d.hi) hiScore=d.hi;
        if(d.wins) tournWins=d.wins;
        if(d.settings) Object.assign(settings, d.settings);
        if(d.friends) friends = d.friends;
        if(d.leaderboard) updateLeaderboard(d.leaderboard);
    } catch(e){ console.error('Load failed:', e); }
}
let autoST;
function schedSave(){ clearTimeout(autoST); autoST=setTimeout(saveGame,2000); }

// ── SHIPS ────────────────────────────────────────────────
const SHIPS = [
    { id:'viper',name:'Viper',r:'common',cost:0,owned:true,spd:5,fire:1,sh:0,hp:3,desc:'Balanced starter',col:'#4eb8ff',acc:'#38bdf8' },
    { id:'hornet',name:'Hornet',r:'common',cost:200,owned:false,spd:6.5,fire:1.2,sh:0,hp:2,desc:'Speed fighter',col:'#39ff14',acc:'#86efac' },
    { id:'corsair',name:'Corsair',r:'rare',cost:1200,owned:false,spd:5.5,fire:1.5,sh:1,hp:3,desc:'Combat raider',col:'#60a5fa',acc:'#93c5fd' },

let shootingStars=[];
function spawnShootingStar(){
    const edge=Math.floor(Math.random()*4);
    let sx,sy,angle;
    switch(edge){
        case 0: sx=Math.random()*W; sy=-20; angle=Math.PI*0.25+Math.random()*Math.PI*0.5; break;
        case 1: sx=W+20; sy=Math.random()*H*0.6; angle=Math.PI*0.7+Math.random()*Math.PI*0.3; break;
        case 2: sx=Math.random()*W; sy=-20; angle=Math.PI*0.3+Math.random()*Math.PI*0.4; break;
        default: sx=-20; sy=Math.random()*H*0.5; angle=-Math.PI*0.25+Math.random()*Math.PI*0.3; break;
    }
    shootingStars.push({x:sx,y:sy,angle:angle,speed:8+Math.random()*18,length:40+Math.random()*90,life:0.7+Math.random()*0.6,maxLife:0.7+Math.random()*0.6,brightness:0.5+Math.random()*0.5});
}
function updateShootingStars(dt){
    shootingStars=shootingStars.filter(s=>{s.life-=dt; s.x+=Math.cos(s.angle)*s.speed; s.y+=Math.sin(s.angle)*s.speed; return s.life>0 && s.x>-100 && s.x<W+100 && s.y>-100 && s.y<H+100;});
    if(Math.random()<0.008 && shootingStars.length<3) spawnShootingStar();
}
function drawShootingStars(ctx){
    shootingStars.forEach(s=>{
        const alpha=s.life/s.maxLife;
        const sx=s.x,sy=s.y,ex=sx-Math.cos(s.angle)*s.length*alpha,ey=sy-Math.sin(s.angle)*s.length*alpha;
        const grad=ctx.createLinearGradient(sx,sy,ex,ey);
        grad.addColorStop(0,`rgba(255,255,255,${alpha})`);
        grad.addColorStop(0.3,`rgba(200,220,255,${alpha*0.7})`);
        grad.addColorStop(1,'rgba(100,150,255,0)');
        ctx.strokeStyle=grad; ctx.lineWidth=1.5*alpha; ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(ex,ey); ctx.stroke();
        ctx.fillStyle=`rgba(255,255,255,${alpha})`; ctx.beginPath(); ctx.arc(sx,sy,2.5*alpha,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=`rgba(200,220,255,${alpha*0.6})`; ctx.beginPath(); ctx.arc(sx,sy,6*alpha,0,Math.PI*2); ctx.fill();
    });
}

let explosionParticles=[], debrisParticles=[], bulletTrails=[], muzzleFlashes=[];
function spawnExplosionParticles(x,y,count=20,color='#e879f9'){
    for(let i=0;i<count;i++){
        const angle=Math.random()*Math.PI*2, speed=1.5+Math.random()*6;
        explosionParticles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:0.4+Math.random()*0.7,maxLife:0.4+Math.random()*0.7,size:1+Math.random()*3.5,color,type:'spark'});
    }
    for(let i=0;i<8;i++){
        const angle=Math.random()*Math.PI*2, speed=0.5+Math.random()*2;
        explosionParticles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:0.6+Math.random()*1.0,maxLife:0.6+Math.random()*1.0,size:3+Math.random()*8,color:'#7c3aed55',type:'smoke'});
    }
}
function spawnDebris(x,y,count=8){
    for(let i=0;i<count;i++){
        const angle=Math.random()*Math.PI*2, speed=2+Math.random()*5;
        debrisParticles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:0.5+Math.random()*0.8,maxLife:0.5+Math.random()*0.8,size:2+Math.random()*5,rotation:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.3,color:Math.random()<0.5?'#a78bfa':'#7c3aed'});
    }
}
function updateParticles(dt){
    explosionParticles=explosionParticles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=dt;if(p.type==='smoke')p.size+=dt*15;return p.life>0;});
    debrisParticles=debrisParticles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life-=dt;p.rotation+=p.rotSpeed;p.size*=0.995;return p.life>0;});
    bulletTrails=bulletTrails.filter(p=>{p.life-=dt;return p.life>0;});
    muzzleFlashes=muzzleFlashes.filter(p=>{p.life-=dt;return p.life>0;});
    if(explosionParticles.length>300) explosionParticles.splice(0,explosionParticles.length-300);
    if(debrisParticles.length>150) debrisParticles.splice(0,debrisParticles.length-150);
    if(bulletTrails.length>200) bulletTrails.splice(0,bulletTrails.length-200);
}
function drawParticles(ctx){
    explosionParticles.forEach(p=>{
        const alpha=p.life/p.maxLife;
        if(p.type==='spark'){
            ctx.fillStyle=`rgba(232,121,249,${alpha})`; ctx.beginPath(); ctx.arc(p.x,p.y,p.size*alpha,0,Math.PI*2); ctx.fill();
            ctx.fillStyle=`rgba(255,255,255,${alpha*0.5})`; ctx.beginPath(); ctx.arc(p.x,p.y,p.size*alpha*0.5,0,Math.PI*2); ctx.fill();
        } else {
            ctx.fillStyle=`rgba(124,58,237,${alpha*0.4})`; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
        }
    });
    debrisParticles.forEach(p=>{
        const alpha=p.life/p.maxLife; ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rotation);
        ctx.fillStyle=`rgba(167,139,250,${alpha})`; ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2); ctx.restore();
    });
    bulletTrails.forEach(p=>{ ctx.fillStyle=`rgba(168,85,247,${p.life/p.maxLife*0.6})`; ctx.beginPath(); ctx.arc(p.x,p.y,2,0,Math.PI*2); ctx.fill(); });
    muzzleFlashes.forEach(p=>{
        const alpha=p.life/p.maxLife, grad=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,8);
        grad.addColorStop(0,`rgba(255,200,255,${alpha})`); grad.addColorStop(0.5,`rgba(180,79,255,${alpha*0.5})`); grad.addColorStop(1,'rgba(180,79,255,0)');
        ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(p.x,p.y,8,0,Math.PI*2); ctx.fill();
    });
}

function renderFullBackground(ctx,time){

    bgStars.forEach(s=>{

        ctx.beginPath(); ctx.arc(s.x,yd,s.r,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha=1;

function resetGame(){
    playerSprite=makePlayerCanvas(activeShip);
    score=0; coinsRun=0; lives=activeShip.hp+(ups.lives||0); level=1; frame=0;
    const spd=activeShip.spd*(ups.speed?1.4:1);
    player={x:W/2,y:H-95,w:60,h:66,speed:spd,invincible:0,shieldHp:activeShip.sh+(ups.shield?3:0),bombs:ups.bombs||0,nukes:ups.nukes||0};
    bullets=[]; enemies=[]; enemyBullets=[]; explosions=[]; powerups=[]; boss=null;
    explosionParticles=[]; debrisParticles=[]; bulletTrails=[]; muzzleFlashes=[];
    screenShake=0; spawnWave(); updateHUD();
}

function gameLoop(timestamp){
    if(gameState!=='play') return;
    globalTime=timestamp;
    const dt=0.016;
    frame++;
    const diff=DIFF_SETTINGS[settings.difficulty];
    if(screenShake>0){
        shakeX=(Math.random()-.5)*screenShake; shakeY=(Math.random()-.5)*screenShake;
        screenShake*=.82; if(screenShake<.3){screenShake=0;shakeX=0;shakeY=0;}
    }
    cx.save(); cx.translate(shakeX,shakeY);
    renderFullBackground(cx,timestamp);
    updateParticles(dt);

    const spd=player.speed;
    if(keys['ArrowLeft']||keys['a'])player.x-=spd;
    if(keys['ArrowRight']||keys['d'])player.x+=spd;
    if(keys['ArrowUp']||keys['w'])player.y-=spd;
    if(keys['ArrowDown']||keys['s'])player.y+=spd;
    if(settings.controlScheme==='mouse'&&!isTouching){ player.x+=(mouseX-player.x)*.1; player.y+=(mouseY-player.y)*.05; }
    player.x=Math.max(player.w/2,Math.min(W-player.w/2,player.x));
    player.y=Math.max(H*.2,Math.min(H-player.h/2,player.y));
    if(player.invincible>0)player.invincible--;

    const pinv=(player.invincible>0)?(frame%6<3?.15:1):1;
    cx.save(); cx.globalAlpha=pinv; cx.drawImage(playerSprite,player.x-30,player.y-33); cx.restore();

    if(player.shieldHp>0){
        cx.save(); cx.globalAlpha=.35+Math.sin(frame*0.15)*0.15; cx.strokeStyle='#00ffe7'; cx.lineWidth=2.5;
        cx.shadowColor='#00ffe7'; cx.shadowBlur=12; cx.beginPath(); cx.arc(player.x,player.y,30,0,Math.PI*2); cx.stroke(); cx.shadowBlur=0; cx.restore();
    }

    // FIXED fire rate: longer delay = slower fire
    const baseDelay = Math.max(3, 14 - (level*.3)) * (1/activeShip.fire);
    const fireInterval = baseDelay * diff.fireDelay;   // higher value -> slower
    if(frame % Math.max(3, Math.floor(fireInterval)) === 0){
        bullets.push({x:player.x,y:player.y-33,h:22});
        spawnBulletTrail(player.x,player.y-33);
        if(ups.triple||level>=5){
            bullets.push({x:player.x-22,y:player.y-22,h:16});
            bullets.push({x:player.x+22,y:player.y-22,h:16});
            spawnBulletTrail(player.x-22,player.y-22);
            spawnBulletTrail(player.x+22,player.y-22);
        }
        sfxShoot();
    }

    bullets=bullets.filter(b=>{
        b.y-=11+level*.1;
        if(b.y<-30) return false;
        ctx.fillStyle='#f0e6ff'; ctx.fillRect(b.x-2.5,b.y-b.h,5,b.h);
        ctx.fillStyle='#a855f7'; ctx.fillRect(b.x-1.5,b.y-b.h,3,b.h);
        let hit=false;
        enemies=enemies.filter(e=>{
            if(!hit&&Math.abs(b.x-e.x)<e.w/2&&b.y<e.y+e.h/2&&b.y>e.y-e.h/2){
                e.hp-=diff.damage;
                if(e.hp<=0){
                    explosions.push({x:e.x,y:e.y,life:1,maxR:40});
                    spawnExplosionParticles(e.x,e.y,18,'#e879f9'); spawnDebris(e.x,e.y,10);
                    score+=Math.ceil(10*level*diff.mult); coinsRun++;
                    sfxBoom(); hit=true;
                    if(Math.random()<.15) dropPowerup(e.x,e.y);
                    updateHUD(); return false;
                } hit=true; sfxHit();
            } return true;
        });
        if(!hit&&boss&&Math.abs(b.x-boss.x)<boss.w/2&&Math.abs(b.y-boss.y)<boss.h/2){
            boss.hp-=1*diff.damage; sfxHit(); spawnExplosionParticles(b.x,b.y,5,'#ff6d00'); hit=true;
            if(boss.hp<=0) killBoss();
        } return !hit;
    });

    let revX=false;
    enemies.forEach(e=>{
        e.x+=e.dx; e.y+=e.dy; e.wobble+=.028; e.x+=Math.sin(e.wobble)*.45;
        if(e.x<e.w/2||e.x>W-e.w/2) revX=true;
        if(e.y>H-100){ e.y=H-100; e.dy=0; }
    });
    if(revX) enemies.forEach(e=>{e.dx*=-1; e.y+=8;});

    enemies.forEach(e=>{
        cx.drawImage(enemySprites[0],e.x-e.w/2,e.y-e.h/2);
        if(player.invincible===0&&Math.abs(e.x-player.x)<(e.w/2+player.w/2)*.6&&Math.abs(e.y-player.y)<(e.h/2+player.h/2)*.6){
            if(player.shieldHp>0){ player.shieldHp--; spawnExplosionParticles(player.x,player.y,8,'#00ffe7'); }
            else {
                lives--; updateHUD(); player.invincible=95; screenShake=12;
                explosions.push({x:player.x,y:player.y,life:1,maxR:52});
                spawnExplosionParticles(player.x,player.y,30,'#ff2d9b');
                if(lives<=0){ cx.restore(); endGame(); return; }
            }
        }
    });

    if(boss){
        boss.x+=boss.dx;
        if(boss.x<boss.w/2||boss.x>W-boss.w/2) boss.dx*=-1;
        cx.drawImage(bossCanvas,boss.x-boss.w/2,boss.y-boss.h/2);
        cx.fillStyle='#06000f'; cx.fillRect(W/2-150,8,300,14);
        const br=Math.max(0,boss.hp/boss.maxHp);
        const hpGrad=cx.createLinearGradient(W/2-150,0,W/2-150+300*br,0);
        hpGrad.addColorStop(0,br>.5?'#7c3aed':'#f87171'); hpGrad.addColorStop(1,br>.5?'#a78bfa':'#ff4444');
        cx.fillStyle=hpGrad; cx.fillRect(W/2-150,8,300*br,14);
        // Boss fire rate depends on difficulty (enemyFireRate: higher = slower)
        const bossFireDelay = Math.max(15, Math.floor(40 * diff.enemyFireRate));
        if(frame % bossFireDelay === 0){
            const a=Math.atan2(player.y-boss.y,player.x-boss.x);
            enemyBullets.push({x:boss.x,y:boss.y+boss.h/2,ang:a,spd:4.5});
        }
    }

    enemyBullets=enemyBullets.filter(b=>{
        b.x+=Math.cos(b.ang)*b.spd*.38; b.y+=b.spd;
        if(b.y>H+22||b.x<-22||b.x>W+22) return false;
        ctx.fillStyle='#fde68a'; ctx.beginPath(); ctx.arc(b.x,b.y,3.5,0,Math.PI*2); ctx.fill();
        if(player.invincible===0&&Math.abs(b.x-player.x)<30&&Math.abs(b.y-player.y)<33){
            if(player.shieldHp>0){ player.shieldHp--; return false; }
            lives--; updateHUD(); player.invincible=95; screenShake=10;
            explosions.push({x:player.x,y:player.y,life:1,maxR:48});
            spawnExplosionParticles(player.x,player.y,25,'#ff2d9b');
            if(lives<=0){ cx.restore(); endGame(); return false; }
            return false;
        } return true;
    });

    powerups=powerups.filter(p=>{
        p.y+=p.dy; if(p.y>H+32) return false;
        const pg=cx.createRadialGradient(p.x,p.y,2,p.x,p.y,13);
        pg.addColorStop(0,'#ffe600'); pg.addColorStop(1,'transparent');
        cx.fillStyle=pg; cx.beginPath(); cx.arc(p.x,p.y,13,0,Math.PI*2); cx.fill();
        cx.fillStyle='#fff'; cx.beginPath(); cx.arc(p.x,p.y,7,0,Math.PI*2); cx.fill();
        if(Math.abs(p.x-player.x)<26&&Math.abs(p.y-player.y)<26){ applyPowerup(p.type); sfxPick(); spawnExplosionParticles(p.x,p.y,10,'#ffe600'); updateHUD(); schedSave(); return false; }
        return true;
    });

    explosions=explosions.filter(ex=>{
        const t=1-ex.life, r=ex.maxR*t;
        cx.strokeStyle='#e879f9'; cx.lineWidth=3*(1-t);
        cx.shadowColor='#e879f9'; cx.shadowBlur=8*(1-t);
        cx.beginPath(); cx.arc(ex.x,ex.y,r,0,Math.PI*2); cx.stroke(); cx.shadowBlur=0;
        ex.life-=.034; return ex.life>0;
    });

    drawParticles(cx);

    if(enemies.length===0&&!boss){ level++; updateHUD(); spawnWave(); setMsg('★ LEVEL '+level+'!'); sfxLvl(); schedSave(); }
    cx.restore();
    animId=requestAnimationFrame(gameLoop);
}

function dropPowerup(x,y){ const types=['shield','laser','bomb','coin','life']; powerups.push({x,y,dy:1.3,type:types[Math.floor(Math.random()*types.length)]}); }
function applyPowerup(type){ switch(type){ case 'life': lives=Math.min(12,lives+1);break; case 'shield': player.shieldHp=Math.min(10,player.shieldHp+2);break; case 'bomb': player.bombs++;break; case 'coin': coinsRun+=10;totalCoins+=10;break; } }

function endGame(){
    gameState='idle'; if(animId) cancelAnimationFrame(animId);
    bgMusic.pause();
    const diff=DIFF_SETTINGS[settings.difficulty];
    const earned=Math.ceil((Math.floor(score/45)+coinsRun)*diff.coins);
    totalCoins+=earned; if(score>hiScore) hiScore=score;
    submitScore(score, settings.difficulty); updateHUD(); schedSave();
    showGameover(false,'GAME OVER','Score: '+score.toLocaleString(),'Gold earned: ★'+earned,'');
}

// ── MENU LOOP ────────────────────────────────────────────
let mf=0;
function menuLoop(timestamp){
    if(gameState!=='menu'){ mf=0; return; }
    globalTime=timestamp; mf++;
    cx.clearRect(0,0,W,H);
    renderFullBackground(cx,timestamp);
    updateParticles(0.016); drawParticles(cx);
    const titleY=H*.24;
    const grad=cx.createLinearGradient(W/2-200,0,W/2+200,0);
    grad.addColorStop(0,'#ff2d9b'); grad.addColorStop(.5,'#b44fff'); grad.addColorStop(1,'#00ffe7');
    cx.fillStyle=grad; cx.font='900 '+(W/14)+'px Orbitron,monospace'; cx.textAlign='center';
    cx.shadowColor='#b44fff'; cx.shadowBlur=30+Math.sin(mf*0.03)*15;
    cx.fillText('SPACE WARS',W/2,titleY); cx.shadowBlur=0;
    cx.font='400 '+(W/48)+'px Rajdhani,sans-serif'; cx.fillStyle='#7c5fa0';
    cx.fillText('by IAN — Commander of the Cosmos',W/2,H*.31);
    requestAnimationFrame(menuLoop);
}

// ── OVERLAY & PANEL SYSTEM (fixed) ────────────────────────
const overlay=document.getElementById('overlay');
let lastMenuPanel = null;

function showPanel(id){
    overlay.innerHTML='';
    overlay.style.display='flex';
    const p=document.createElement('div'); p.className='panel';
    p.innerHTML=buildPanel(id);
    overlay.appendChild(p);
    if(id==='hangar') renderHangar(p);
    if(id==='shop') updateShopBtns(p);
}
function hideOverlay(){ overlay.style.display='none'; overlay.innerHTML=''; }

// Called from top bar while menu is open – preserves menu state
function showPanelFromTopBar(id){
    if(gameState==='menu' && overlay.style.display==='flex'){
        // Replace panel content but keep menu reference
        showPanel(id);
    } else {
        showPanel(id);
    }
}

function buildPanel(id){
    switch(id){
        case 'menu': return `
            <div class="panel-title">SPACE WARS</div>
            <div class="panel-sub">Choose difficulty and begin!</div>
            <div style="text-align:center;margin:15px 0;">
                <div class="diff-btn easy" onclick="selectDiff('easy')">EASY</div>
                <div class="diff-btn normal selected" onclick="selectDiff('normal')">NORMAL</div>
                <div class="diff-btn hard" onclick="selectDiff('hard')">HARD</div>
                <div class="diff-btn insane" onclick="selectDiff('insane')">INSANE</div>
                <div class="diff-btn impossible" onclick="selectDiff('impossible')">IMPOSSIBLE</div>
            </div>
            <button class="btn primary" onclick="startGame()">▶ START CAMPAIGN</button>
            <button class="btn" onclick="startMultiplayer()">👥 LOCAL 2-PLAYER</button>
            <button class="btn" onclick="showPanel('hangar')">🚀 HANGAR</button>
            <button class="btn" onclick="showPanel('shop')">🛒 SHOP</button>
            <button class="btn" onclick="showPanel('profile')">👤 PROFILE: ${username}</button>
            <button class="btn" onclick="showPanel('settings')">⚙ SETTINGS</button>
            <div style="text-align:center;margin-top:10px;font-size:10px;color:var(--sub);">HI: ${hiScore.toLocaleString()} | ★${totalCoins.toLocaleString()}</div>
        `;
        case 'shop': return `
            <button class="close-btn" onclick="showPanel('menu')">✕</button>
            <div class="panel-title">SHOP</div><div style="color:var(--neon-yellow);margin:10px 0;">★ <span id="s-gold">${totalCoins.toLocaleString()}</span></div>
            ${UP_LIST.map(u=>`
                <div class="row"><div class="row-name">${u.name}<span class="row-desc">${u.desc}</span></div>
                <span class="row-cost">★${u.cost.toLocaleString()}</span>
                <button class="ibtn${(ups[u.id]===true||ups[u.id]>0)?' owned':''}" onclick="buyUp('${u.id}',${u.cost})">${totalCoins>=u.cost?'BUY':'—'}</button></div>
            `).join('')}
            <button class="btn" onclick="showPanel('menu')">← BACK</button>
        `;
        case 'hangar': return `
            <button class="close-btn" onclick="showPanel('menu')">✕</button>
            <div class="panel-title">HANGAR</div><div style="color:var(--neon-yellow);margin:10px 0;">★ ${totalCoins.toLocaleString()}</div>
            <div id="ship-list-container"></div>
            <button class="btn" onclick="showPanel('menu')">← BACK</button>
        `;
        case 'settings': return `
            <button class="close-btn" onclick="showPanel('menu')">✕</button>
            <div class="panel-title">SETTINGS</div>
            <div class="sec">Resolution</div>${['auto','720p','1080p','1440p'].map(r=>`<button class="tab${settings.resolution===r?' active':''}" onclick="setResolution('${r}')">${r.toUpperCase()}</button>`).join('')}
            <div class="sec">Control Scheme</div>${['mouse','keyboard','touch'].map(c=>`<button class="tab${settings.controlScheme===c?' active':''}" onclick="setControl('${c}')">${c.toUpperCase()}</button>`).join('')}
            <button class="btn" onclick="showPanel('menu')">← BACK</button>
        `;
        case 'profile': return `
            <button class="close-btn" onclick="showPanel('menu')">✕</button>
            <div class="panel-title">PROFILE</div>
            <div style="text-align:center;margin:20px 0;"><div style="font-size:48px;">${userAvatar}</div><div style="font-size:18px;color:var(--neon-cyan);">${username}</div></div>
            <input type="text" id="new-username" placeholder="New username..." value="${username}"/>
            <button class="btn primary" onclick="changeUsername()">💾 SAVE</button>
            <div class="sec">Avatar</div><div style="text-align:center;">${['👤','🚀','👽','🤖','👾','🛸','⚡','🌟'].map(a=>`<span style="font-size:32px;cursor:pointer;margin:5px;${a===userAvatar?'opacity:1':'opacity:0.5'}" onclick="changeAvatar('${a}')">${a}</span>`).join('')}</div>
            <button class="btn" onclick="showPanel('menu')">← BACK</button>
        `;
        case 'friends': return `
            <button class="close-btn" onclick="hideOverlay()">✕</button>
            <div class="panel-title">FRIENDS</div>
            ${friends.map(f=>`<div class="friend-item"><div class="friend-avatar">${f.avatar}</div><div style="flex:1;"><div style="font-weight:700;">${f.name}</div><div style="font-size:10px;">Score: ${f.score.toLocaleString()}</div></div><button class="ibtn danger" onclick="removeFriend('${f.name}')">✕</button></div>`).join('')}
            <button class="btn" onclick="hideOverlay()">← CLOSE</button>
        `;
        case 'leaderboard': return `
            <button class="close-btn" onclick="hideOverlay()">✕</button>
            <div class="panel-title">LEADERBOARD</div>
            <div style="max-height:400px;overflow-y:auto;">${leaderboard.map((e,i)=>`<div class="lb-entry"><span class="lb-rank">#${i+1}</span><div style="flex:1;"><div style="color:${e.name===username?'var(--neon-cyan)':'#fff'};">${e.name}</div><div style="font-size:10px;">${e.difficulty.toUpperCase()}</div></div><div style="color:var(--neon-yellow);">${e.score.toLocaleString()}</div></div>`).join('')}</div>
            <button class="btn" onclick="hideOverlay()">← CLOSE</button>
        `;
        default: return '<button class="btn" onclick="showPanel(\'menu\')">← BACK</button>';
    }
}

function showGameover(win,title,sub,coins,extra){
    overlay.innerHTML=''; overlay.style.display='flex';
    const p=document.createElement('div'); p.className='panel';
    p.innerHTML=`<div class="panel-title" style="color:${win?'var(--neon-green)':'#f87171'}">${title}</div><div class="panel-sub">${sub}</div><div style="text-align:center;margin:16px 0;"><div style="font-size:26px;color:var(--neon-yellow);">${extra||coins}</div></div><button class="btn primary" onclick="startGame()">▶ PLAY AGAIN</button><button class="btn" onclick="showPanel('leaderboard')">🏆 LEADERBOARD</button><button class="btn" onclick="showPanel('menu')">⬅ MENU</button>`;
    overlay.appendChild(p);
}

function renderHangar(panel){
    const el=panel.querySelector('#ship-list-container'); if(!el)return; el.innerHTML='';
    SHIPS.forEach(s=>{
        const row=document.createElement('div'); row.className='row';
        const mini=document.createElement('canvas'); mini.className='ship-mini'; mini.width=46;mini.height=46;
        const g2=mini.getContext('2d'); g2.scale(.7,.7); g2.drawImage(makePlayerCanvas(s),0,0);
        const equipped=activeShip.id===s.id;
        row.innerHTML=`<div style="flex:1;margin-left:8px;"><div class="r-${s.r}" style="font-size:13px;">${s.name}</div><div style="font-size:10px;">${s.desc}</div></div><span style="color:var(--neon-yellow);">${s.owned?'':'★'+s.cost.toLocaleString()}</span>`;
        row.insertBefore(mini,row.firstChild);
        const btn=document.createElement('button'); btn.className='ibtn'+(equipped?' owned':'');
        if(s.owned){ btn.textContent=equipped?'✓ ACTIVE':'EQUIP'; btn.onclick=()=>{activeShip=s;playerSprite=makePlayerCanvas(s);updateHUD();renderHangar(panel);schedSave();}; }
        else { btn.textContent=totalCoins>=s.cost?'BUY':'—'; btn.disabled=totalCoins<s.cost; btn.onclick=()=>{if(totalCoins<s.cost)return;totalCoins-=s.cost;s.owned=true;activeShip=s;playerSprite=makePlayerCanvas(s);renderHangar(panel);updateHUD();schedSave();}; }
        row.appendChild(btn); el.appendChild(row);
    });
}

function updateShopBtns(panel){ const sg=panel.querySelector('#s-gold'); if(sg)sg.textContent=totalCoins.toLocaleString(); }
function buyUp(id,cost){ if(totalCoins<cost)return; totalCoins-=cost; if(id==='bombs')ups.bombs++; else if(id==='nukes')ups.nukes++; else if(id==='lives')ups.lives++; else ups[id]=true; sfxPick(); updateHUD(); schedSave(); showPanel('shop'); }
function selectDiff(d){ settings.difficulty=d; document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('selected')); const sel=document.querySelector('.diff-btn.'+d); if(sel)sel.classList.add('selected'); updateHUD(); schedSave(); }
function setResolution(r){ settings.resolution=r; initCanvas(); rebuildBg(); initStars(); initPlanets(); initSpaceDust(); schedSave(); showPanel('settings'); }
function setControl(c){ settings.controlScheme=c; schedSave(); showPanel('settings'); }
function changeUsername(){ const input=document.getElementById('new-username'); if(input&&input.value.trim()){ username=input.value.trim(); document.getElementById('user-name').textContent=username; saveUserData(); showPanel('profile'); } }
function changeAvatar(a){ userAvatar=a; document.getElementById('user-avatar').textContent=a; saveUserData(); showPanel('profile'); }

function startGame(){
    if(animId) cancelAnimationFrame(animId);
    hideOverlay();
    gameState='play'; multiplayerMode=false;
    if(!bgStars||bgStars.length===0) initStars();
    resetGame();
    initAC();
    bgMusic.play().catch(e=>{});
    setMsg('Controls: Mouse/WASD · [B]Bomb · [N]Nuke');
    gameLoop(performance.now());
}
function startMultiplayer(){ alert('Local 2-player: P1 WASD, P2 Arrows'); startGame(); multiplayerMode=true; }

// ── CONTROLS ──────────────────────────────────────────────
document.addEventListener('keydown',e=>{
    keys[e.key]=true;
    if(AC&&AC.state==='suspended') AC.resume();
    if(e.key==='Escape'&&gameState==='play'){
        gameState='menu'; cancelAnimationFrame(animId); bgMusic.pause();
        showPanel('menu'); menuLoop(performance.now());
    }
    if(e.key==='b'&&gameState==='play'&&player&&player.bombs>0){
        player.bombs--; enemies.forEach(e=>{explosions.push({x:e.x,y:e.y,life:1,maxR:50}); spawnExplosionParticles(e.x,e.y,15,'#ffe600');}); enemyBullets=[];
        if(boss){ boss.hp-=boss.maxHp*0.3; if(boss.hp<=0)killBoss(); } screenShake=18; sfxBoom(); updateHUD(); schedSave();
    }
    if(e.key==='n'&&gameState==='play'&&player&&player.nukes>0&&boss){ player.nukes--; boss.hp-=boss.maxHp*0.6; spawnExplosionParticles(boss.x,boss.y,60,'#ff2d9b'); screenShake=25; sfxBossExplode(); if(boss.hp<=0)killBoss(); schedSave(); }
});
document.addEventListener('keyup',e=>keys[e.key]=false);
cv.addEventListener('mousemove',e=>{ isTouching=false; const r=cv.getBoundingClientRect(); mouseX=(e.clientX-r.left)*(W/r.width); mouseY=(e.clientY-r.top)*(H/r.height); if(AC&&AC.state==='suspended') AC.resume(); },{passive:true});
cv.addEventListener('touchmove',e=>{ e.preventDefault(); isTouching=true; const r=cv.getBoundingClientRect(); const t=e.touches[0]; if(player){ player.x=(t.clientX-r.left)*(W/r.width); player.y=(t.clientY-r.top)*(H/r.height); } },{passive:false});
cv.addEventListener('click',()=>{ if(AC&&AC.state==='suspended') AC.resume(); });

// ── INIT ──────────────────────────────────────────────────
loadGame();
playerSprite=makePlayerCanvas(activeShip);
updateHUD();
initStars(); initPlanets(); initSpaceDust();
gameState='menu'; showPanel('menu'); menuLoop(performance.now());
setInterval(()=>{ if(gameState==='play') saveGame(); },30000);
</script>
